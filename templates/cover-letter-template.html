<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — {{SUBJECT}}</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    line-height: 1.65;
    color: #1a1a2e;
    background: #ffffff;
    padding: 0;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: 210mm;
    margin: 0 auto;
    padding: 2px 0;
  }

  /* === HEADER (matches CV template) === */
  .header {
    margin-bottom: 24px;
  }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    line-height: 1.1;
  }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 10px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10.5px;
    line-height: 1.4;
    color: #555;
  }

  .contact-row a {
    color: #555;
    text-decoration: none;
  }

  .contact-row .separator {
    color: #ccc;
  }

  /* === RECIPIENT + DATE === */
  .letter-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
  }

  .recipient {
    font-size: 11.5px;
    line-height: 1.6;
    color: #333;
  }

  .recipient .company-name {
    font-weight: 600;
    color: hsl(270, 70%, 45%);
  }

  .letter-date {
    font-size: 11px;
    color: #777;
    white-space: nowrap;
    text-align: right;
  }

  /* === SUBJECT LINE === */
  .subject {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1.5px solid #e2e2e2;
  }

  /* === LETTER BODY === */
  .salutation {
    font-size: 11.5px;
    margin-bottom: 14px;
    color: #1a1a2e;
  }

  .letter-body p {
    font-size: 11.5px;
    line-height: 1.7;
    color: #2f2f2f;
    margin-bottom: 12px;
  }

  .letter-body ul {
    padding-left: 18px;
    margin-bottom: 14px;
  }

  .letter-body li {
    font-size: 11.5px;
    line-height: 1.65;
    color: #2f2f2f;
    margin-bottom: 10px;
  }

  .letter-body li strong {
    font-weight: 600;
    color: #1a1a2e;
  }

  /* === CLOSING === */
  .closing {
    margin-top: 20px;
    font-size: 11.5px;
    color: #1a1a2e;
  }

  .closing .regards {
    margin-bottom: 28px;
  }

  .closing .signature-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #1a1a2e;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .page {
      padding: 0;
    }
  }

  /* Links never break across lines */
  a {
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER (same as CV) -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
      <span class="separator">|</span>
      <span>{{PHONE}}</span>
    </div>
  </div>

  <!-- RECIPIENT + DATE -->
  <div class="letter-meta">
    <div class="recipient">
      <div class="company-name">{{COMPANY_NAME}}</div>
      <div>{{COMPANY_TEAM}}</div>
      <div>{{COMPANY_CITY}}</div>
    </div>
    <div class="letter-date">{{LOCATION_SENDER}}, {{DATE}}</div>
  </div>

  <!-- SUBJECT -->
  <div class="subject">{{SUBJECT}}</div>

  <!-- SALUTATION -->
  <div class="salutation">{{SALUTATION}}</div>

  <!-- LETTER BODY -->
  <div class="letter-body">
    {{BODY}}
  </div>

  <!-- CLOSING -->
  <div class="closing">
    <div class="regards">{{REGARDS}}</div>
    <div class="signature-name">{{NAME}}</div>
  </div>

</div>
</body>
</html>
